services:
  mongodb:
    image: mongo:6
    container_name: kanban-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=kanban-auth
    networks:
      - kanban-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kanban-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/kanban-auth
      - JWT_SECRET=your_jwt_secret_key_here_change_in_production
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - kanban-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kanban-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=
    networks:
      - kanban-network

networks:
  kanban-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local